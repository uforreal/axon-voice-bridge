name: Build iOS IPA

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build_ios:
    name: Build Flutter iOS App
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install dependencies
        run: flutter pub get

      - name: Pod Install
        run: |
          cd ios
          rm -rf Pods
          rm Podfile.lock
          pod install
          cd ..

      - name: Disable Signing (Aggressive)
        run: |
          cd ios
          # 1. Disable signing in project level
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES/CODE_SIGNING_ALLOWED = NO/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' Runner.xcodeproj/project.pbxproj

          # 2. Remove Development Team ID
          sed -i '' '/DevelopmentTeam =/d' Runner.xcodeproj/project.pbxproj

          # 3. Force Code Sign Identity to empty
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Distribution";/CODE_SIGN_IDENTITY = "";/g' Runner.xcodeproj/project.pbxproj
          cd ..

      - name: Build iOS (No Codesign)
        run: |
          flutter build ios --release --no-codesign

      - name: Create Payload Directory
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/

      - name: Zip IPA
        run: |
          zip -r AXONVoice.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AXONVoice
          path: AXONVoice.ipa
